server:
  port: 8082

spring:
  application:
    name: student-service

  datasource:
    url: jdbc:postgresql://localhost:5432/student_db
    username: postgres
    password: change_me

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka